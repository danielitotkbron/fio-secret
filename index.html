<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fio - 86 Días</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        :root {
            --color-papel: #e0c9a6;
            --color-quemado: #3d1f05;
            --color-texto: #2b1b0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Caveat', cursive;
            background-color: var(--color-papel);
            color: var(--color-texto);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* --- EFECTO QUEMADO CSS --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }

        /* --- FONDO ANIMADO "FIO TE AMO" --- */
        .fondo-capa {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            transform: rotate(-25deg);
            z-index: 0;
            opacity: 0.15;
            pointer-events: none;
            overflow: hidden;
            white-space: wrap;
            font-size: 2.5rem;
            line-height: 1.2;
            animation: fluir 60s linear infinite;
        }

        @keyframes fluir {
            from { transform: rotate(-25deg) translateY(0); }
            to { transform: rotate(-25deg) translateY(-20%); }
        }

        /* --- MENÚ LATERAL (IZQUIERDA) --- */
        .sidebar {
            position: absolute;
            left: 0;
            top: 0;
            width: 280px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border-right: 2px solid var(--color-quemado);
            z-index: 20;
            transition: transform 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            padding: 80px 20px 20px 20px;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .lista-fechas {
            list-style: none;
            font-size: 1.8rem;
        }

        .lista-fechas li {
            padding: 10px;
            border-bottom: 1px solid rgba(61, 31, 5, 0.3);
            cursor: pointer;
        }

        /* --- BOTÓN HAMBURGUESA --- */
        .menu-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 30;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--color-quemado);
        }

        .menu-toggle div {
            width: 25px;
            height: 3px;
            background: var(--color-quemado);
            margin: 5px 0;
            transition: 0.4s;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 15;
            transition: margin-left 0.5s;
            padding: 20px;
        }

        /* --- CONTADOR --- */
        .contador-box {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid var(--color-quemado);
            border-radius: 20px 5px 25px 8px/8px 20px 5px 25px;
            padding: 20px 40px;
            text-align: center;
            margin-bottom: 30px;
            transform: rotate(-2deg);
        }

        .contador-box h1 {
            font-size: 5rem;
        }

        /* --- AREA DE NOTAS (DERECHA / CENTRO) --- */
        .diario-area {
            width: 100%;
            max-width: 600px;
            height: 60vh;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--color-quemado);
            border-radius: 15px;
            padding: 20px;
            font-size: 1.8rem;
            color: var(--color-texto);
            outline: none;
            resize: none;
            user-select: text; /* Aquí sí permitimos seleccionar para escribir */
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { width: 100%; }
            .contador-box h1 { font-size: 3rem; }
            .diario-area { height: 40vh; }
        }
    </style>
</head>
<body>

    <div class="menu-toggle" id="menuBtn">
        <div></div><div></div><div></div>
    </div>

    <div class="fondo-capa" id="fondoTexto"></div>

    <aside class="sidebar" id="sidebar">
        <ul class="lista-fechas">
            <li>12, febrero</li>
            <li>13, febrero</li>
            <li>... diario activo</li>
        </ul>
    </aside>

    <main class="main-content" id="mainContent">
        <div class="contador-box">
            <h1 id="count">0</h1>
            <p style="font-size: 1.5rem;">días sin ti</p>
        </div>

        <textarea class="diario-area" id="diario" placeholder="Escribe tu día a día aquí... (se guarda solo)"></textarea>
    </main>

    <script>
        // --- Cálculo de Días Exactos ---
        function actualizarContador() {
            const inicio = new Date('2026-02-12T00:00:00');
            const hoy = new Date();
            const diff = hoy - inicio;
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('count').innerText = `${dias} / 365`;
        }

        // --- Manejo del Menú ---
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        
        menuBtn.onclick = () => {
            sidebar.classList.toggle('hidden');
        };

        // --- Fondo "Fio te amo" ---
        const fondo = document.getElementById('fondoTexto');
        const frase = "fio te amo ";
        fondo.innerText = frase.repeat(1500);

        // --- Guardado Automático ---
        const diario = document.getElementById('diario');
        // Cargar lo guardado
        diario.value = localStorage.getItem('miDiario') || "";
        // Guardar al escribir
        diario.oninput = () => {
            localStorage.setItem('miDiario', diario.value);
        };

        actualizarContador();
    </script>
</body>
</html>
