<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Diario</title>
    <style>
        /* Importar fuente de escritura a mano */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            background-color: #f4e3c5; /* Color tipo papel viejo/pergamino */
            color: #3e2723;
            min-height: 100vh;
            overflow: hidden; /* Evita que el fondo animado cree barras de desplazamiento */
            position: relative;
            /* Sombra interior para simular bordes quemados/viejos */
            box-shadow: inset 0 0 100px rgba(139, 69, 19, 0.4);
        }

        /* --- FONDO ANIMADO DE TEXTO --- */
        .fondo-texto {
            position: fixed;
            top: -100%;
            left: -100%;
            width: 300%;
            height: 300%;
            z-index: -1;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            
            /* Evitar selección del texto */
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
            
            font-size: 2.5rem;
            color: rgba(139, 69, 19, 0.12); /* Color café muy transparente */
            line-height: 1;
            
            /* Animación hacia arriba y derecha */
            animation: moverFondo 40s linear infinite;
        }

        @keyframes moverFondo {
            0% { transform: rotate(-35deg) translateY(0); }
            100% { transform: rotate(-35deg) translateY(-10%); }
        }

        /* --- BOTÓN MENÚ HAMBURGUESA --- */
        .btn-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid #5a3b1c;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(2px);
            transition: background 0.3s;
        }

        .btn-menu:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .btn-menu span {
            display: block;
            width: 30px;
            height: 3px;
            background-color: #5a3b1c;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        .contenedor {
            display: flex;
            justify-content: space-between;
            padding: 2rem;
            padding-top: 5rem; /* Espacio para que no choque con el botón del menú */
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            gap: 2rem;
            transition: all 0.4s ease;
        }

        /* Estilo general para las cajas */
        .panel {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #5a3b1c;
            /* Borde con estilo de dibujo a mano alzada */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 2rem;
            height: 85%;
            backdrop-filter: blur(2px);
            overflow-y: auto;
            transition: all 0.4s ease;
        }

        /* Ocultar barra de scroll en paneles */
        .panel::-webkit-scrollbar {
            width: 5px;
        }
        .panel::-webkit-scrollbar-thumb {
            background: rgba(90, 59, 28, 0.3);
            border-radius: 10px;
        }

        /* Panel Izquierdo (Fechas) */
        .panel-izquierdo {
            width: 25%;
            min-width: 250px;
            opacity: 1;
        }

        /* Clase para ocultar el panel izquierdo cuando se toca el menú */
        .panel-izquierdo.oculto {
            width: 0;
            min-width: 0;
            padding: 0;
            border: none;
            opacity: 0;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .lista-fechas {
            list-style: none;
            font-size: 2rem;
            /* Evitar que el texto se rompa feo al contraerse */
            white-space: nowrap; 
        }

        .lista-fechas li {
            border-bottom: 2px solid rgba(90, 59, 28, 0.3);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lista-fechas li:hover {
            color: #8b4513;
        }

        /* Panel Central */
        .panel-central {
            width: 35%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 1rem;
        }

        .contador {
            font-size: 4rem;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid #5a3b1c;
            /* Borde irregular tipo boceto */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 1.5rem 3rem;
            text-align: center;
            transform: rotate(-3deg);
            white-space: nowrap;
        }

        /* Panel Derecho (Ideas/Notas) */
        .panel-derecho {
            width: 35%;
            font-size: 2rem;
            flex-grow: 1; /* Permite que este panel crezca si hay espacio */
        }

        /* Cuando el panel izquierdo está oculto, el derecho y el central se ajustan */
        .contenedor.expandido .panel-derecho {
            width: 60%; /* Toma mucho más espacio para que puedas leer cómodamente */
        }

        /* --- ADAPTACIÓN PARA PANTALLAS PEQUEÑAS (CELULARES) --- */
        @media (max-width: 900px) {
            body {
                overflow: auto; /* Permite hacer scroll hacia abajo */
            }
            
            .contenedor {
                flex-direction: column;
                align-items: center;
                height: auto;
                padding-top: 5rem;
            }

            .panel-izquierdo {
                width: 95%;
                height: 300px;
            }

            .panel-central {
                width: 100%;
            }

            .panel-derecho {
                width: 95%;
                height: 500px; /* Más alto para escribir en celular */
            }

            .contador {
                font-size: 3rem;
                padding: 1rem;
            }

            .contenedor.expandido .panel-derecho {
                width: 95%; /* En celular se mantiene al 95% aunque se oculte el menú */
            }
        }
    </style>
</head>
<body>

    <!-- Botón Menú Hamburguesa -->
    <div class="btn-menu" id="btn-menu" title="Ocultar/Mostrar Fechas">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Capa del fondo de letras -->
    <div class="fondo-texto" id="fondo-texto"></div>

    <div class="contenedor" id="contenedor-principal">
        <!-- Izquierda: Fechas (Este es el que se contrae) -->
        <div class="panel panel-izquierdo" id="panel-menu">
            <ul class="lista-fechas">
                <li>12, febrero</li>
                <li>13, febrero</li>
                <li>14, febrero</li>
                <!-- Aquí puedes seguir añadiendo tus fechas -->
            </ul>
        </div>

        <!-- Centro: Contador de días -->
        <div class="panel-central">
            <div class="contador">
                <span id="dias-transcurridos">0</span> / 365 dias
            </div>
        </div>

        <!-- Derecha: Ideas / Notas -->
        <div class="panel panel-derecho">
            <h2>Mi diario</h2>
            <p>Aquí puedes empezar a escribir todo lo que sientes. Al ocultar el menú de la izquierda, tendrás mucho más espacio para leer tus pensamientos de forma clara y sin distracciones...</p>
        </div>
    </div>

    <script>
        // --- 1. Lógica del Menú Hamburguesa ---
        const btnMenu = document.getElementById('btn-menu');
        const panelMenu = document.getElementById('panel-menu');
        const contenedorPrincipal = document.getElementById('contenedor-principal');

        btnMenu.addEventListener('click', () => {
            // Alterna la clase 'oculto' en el panel izquierdo
            panelMenu.classList.toggle('oculto');
            // Alterna la clase 'expandido' en el contenedor para hacer la caja de notas más ancha
            contenedorPrincipal.classList.toggle('expandido');
        });


        // --- 2. Generar el texto de fondo repetido ---
        const contenedorFondo = document.getElementById('fondo-texto');
        const frase = "fio te amo. ";
        // Repetimos la frase muchas veces para llenar el contenedor gigante
        contenedorFondo.innerText = frase.repeat(3000);


        // --- 3. Calcular los días transcurridos ---
        // El mes en JavaScript empieza en 0 (Enero es 0, Febrero es 1, Mayo es 4)
        // Fecha de inicio: 12 de Febrero de 2026
        const fechaInicio = new Date(2026, 1, 12); 
        const fechaActual = new Date(); // La fecha de hoy

        // Calculamos la diferencia en milisegundos
        const diferenciaMilisegundos = Math.max(0, fechaActual - fechaInicio);

        // Convertimos los milisegundos a días (1000ms * 60s * 60m * 24h)
        const diasTranscurridos = Math.floor(diferenciaMilisegundos / (1000 * 60 * 60 * 24));

        // Mostramos el resultado en el HTML
        document.getElementById('dias-transcurridos').innerText = diasTranscurridos;
    </script>

</body>
</html>
