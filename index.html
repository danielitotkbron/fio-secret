<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diario - Fio</title>
    <style>
        /* Importar fuente de escritura a mano */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            background-color: #d2b48c; /* Color papel base */
            color: #3e2723;
            height: 100vh;
            overflow: hidden;
            position: relative;
            /* Efecto de bordes quemados/antiguos */
            box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.7);
        }

        /* --- FONDO ANIMADO "FIO TE AMO" --- */
        .fondo-capa {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            transform: rotate(-25deg);
            opacity: 0.15; /* Sutil para que no moleste la lectura */
            font-size: 2.2rem;
            line-height: 1.1;
            animation: moverFondo 60s linear infinite;
        }

        @keyframes moverFondo {
            from { transform: rotate(-25deg) translateY(0); }
            to { transform: rotate(-25deg) translateY(-20%); }
        }

        /* --- MENÚ HAMBURGUESA --- */
        .btn-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            cursor: pointer;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #3e2723;
            border-radius: 5px;
        }

        .btn-menu div {
            width: 25px;
            height: 3px;
            background-color: #3e2723;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .wrapper {
            display: flex;
            height: 100vh;
            padding: 20px;
            padding-top: 80px;
            z-index: 10;
            position: relative;
            gap: 20px;
        }

        /* Panel Izquierdo (Menu Fechas) */
        .sidebar {
            width: 250px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 2px solid #3e2723;
            border-radius: 15px;
            padding: 20px;
            overflow-y: auto;
            transition: 0.4s;
        }

        .sidebar.oculto {
            transform: translateX(-300px);
            width: 0;
            padding: 0;
            margin: 0;
            opacity: 0;
        }

        .sidebar h3 { font-size: 2rem; border-bottom: 1px solid #3e2723; margin-bottom: 10px; }
        .sidebar ul { list-style: none; font-size: 1.6rem; }
        .sidebar li { padding: 5px 0; border-bottom: 1px dashed rgba(0,0,0,0.2); }

        /* Panel Central (Contador) */
        .main-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contador-caja {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid #3e2723;
            padding: 20px 40px;
            border-radius: 20px 5px 25px 8px/8px 20px 5px 25px;
            text-align: center;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }

        .contador-caja h1 { font-size: 4rem; }

        /* Panel Derecho (Notas) */
        .notas {
            width: 40%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #3e2723;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: 0.4s;
        }

        .wrapper.expandido .notas { width: 70%; }

        .notas h2 { text-align: center; font-size: 2.2rem; }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            resize: none;
            color: #3e2723;
        }

        /* Responsive Móvil */
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: 200px; }
            .notas { width: 100%; height: 400px; }
            .contador-caja h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="btn-menu" id="btnMenu">
        <div></div><div></div><div></div>
    </div>

    <div class="fondo-capa" id="fondoTexto"></div>

    <div class="wrapper" id="contenedor">
        <aside class="sidebar" id="menuLateral">
            <h3>Fechas</h3>
            <ul>
                <li>12, febrero</li>
                <li>13, febrero</li>
                <li>...</li>
                <li>09, mayo (Hoy)</li>
            </ul>
        </aside>

        <main class="main-center">
            <div class="contador-caja">
                <h1 id="num-dias">0 / 365</h1>
                <p style="font-size: 1.4rem;">días desde que te perdí</p>
            </div>

            <section class="notas">
                <h2>Mis Notas</h2>
                <textarea id="textoDiario" placeholder="Escribe aquí cómo te sientes hoy..."></textarea>
            </section>
        </main>
    </div>

    <script>
        // 1. Contador de días exacto (Feb 12, 2026 a Mayo 9, 2026)
        function calcularDias() {
            const inicio = new Date('2026-02-12T00:00:00');
            const hoy = new Date(); // Detecta la fecha actual (Mayo 9, 2026)
            const diferencia = hoy - inicio;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            document.getElementById('num-dias').innerText = `${dias} / 365`;
        }

        // 2. Fondo animado "fio te amo"
        const capa = document.getElementById('fondoTexto');
        capa.innerText = "fio te amo ".repeat(1500);

        // 3. Menú Hamburguesa
        const btn = document.getElementById('btnMenu');
        const menu = document.getElementById('menuLateral');
        const wrapper = document.getElementById('contenedor');

        btn.onclick = () => {
            menu.classList.toggle('oculto');
            wrapper.classList.toggle('expandido');
        };

        // 4. Guardado automático del diario
        const areaTexto = document.getElementById('textoDiario');
        areaTexto.value = localStorage.getItem('diario_fio') || "";
        areaTexto.oninput = () => {
            localStorage.setItem('diario_fio', areaTexto.value);
        };

        calcularDias();
    </script>
</body>
</html>
