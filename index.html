<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Diario</title>
    <style>
        /* Importar fuente de escritura a mano */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            
            /* --- EFECTO PAPEL QUEMADO 100% CSS --- */
            background-color: #dcbfa3; /* Color base pergamino/papel viejo */
            background-image: 
                /* Sombra radial oscura en los bordes simulando lo quemado */
                radial-gradient(circle at 50% 50%, transparent 30%, rgba(70, 30, 10, 0.85) 110%),
                /* Ligera textura de líneas para darle imperfección al papel */
                repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(139, 69, 19, 0.03) 2px, rgba(139, 69, 19, 0.03) 4px);
            
            color: #3e2723;
            min-height: 100vh;
            overflow-x: hidden; 
            position: relative;
            
            /* Refuerzo de quemado en los límites de la pantalla */
            box-shadow: inset 0 0 120px rgba(40, 15, 5, 0.9);
        }

        /* --- CONTENEDOR DEL FONDO ANIMADO --- */
        .fondo-animado-container {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0; /* Por detrás de los paneles */
            pointer-events: none; /* Nadie puede seleccionarlo */
            user-select: none;
            -webkit-user-select: none;
            transform: rotate(-25deg); /* Inclinación hacia la esquina superior derecha */
            overflow: hidden;
            
            /* Para que las letras se mezclen un poco con el color a quemado del fondo */
            mix-blend-mode: multiply; 
        }

        .fondo-texto {
            width: 100%;
            font-size: 3.5rem;
            color: rgba(90, 45, 20, 0.35); /* Texto marrón difuminado */
            line-height: 1.1;
            font-weight: bold;
            text-align: justify;
            /* Animación suave y continua hacia arriba */
            animation: moverFondo 80s linear infinite;
        }

        @keyframes moverFondo {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* --- BOTÓN MENÚ HAMBURGUESA --- */
        .btn-menu {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(220, 191, 163, 0.5);
            border: 2px solid #5a3b1c;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 6px;
            backdrop-filter: blur(4px);
            transition: background 0.3s;
        }

        .btn-menu:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        .btn-menu span {
            display: block;
            width: 30px;
            height: 3px;
            background-color: #5a3b1c;
            border-radius: 2px;
        }

        /* --- ESTRUCTURA PRINCIPAL --- */
        .contenedor {
            display: flex;
            justify-content: space-between;
            padding: 2rem;
            padding-top: 6rem; /* Espacio para el botón de menú */
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            gap: 2rem;
            position: relative;
            z-index: 1; /* Asegura que esté por encima del fondo de texto */
        }

        /* Estilo general para las cajas */
        .panel {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #5a3b1c;
            /* Borde con estilo de dibujo a mano alzada como en tu boceto */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 2rem;
            height: 85%;
            backdrop-filter: blur(4px);
            overflow-y: auto;
            transition: all 0.5s ease;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* Ocultar barra de scroll en paneles */
        .panel::-webkit-scrollbar {
            width: 6px;
        }
        .panel::-webkit-scrollbar-thumb {
            background: rgba(90, 59, 28, 0.4);
            border-radius: 10px;
        }

        /* Panel Izquierdo (Fechas) */
        .panel-izquierdo {
            width: 25%;
            min-width: 220px;
            max-width: 300px;
            opacity: 1;
        }

        /* Estado oculto del panel izquierdo */
        .panel-izquierdo.oculto {
            min-width: 0;
            max-width: 0;
            width: 0;
            padding: 0;
            border: none;
            opacity: 0;
            margin: 0;
            overflow: hidden;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .lista-fechas {
            list-style: none;
            font-size: 2.2rem;
            white-space: nowrap; 
        }

        .lista-fechas li {
            /* Simulando la línea ondulada de tu boceto bajo las fechas */
            border-bottom: 2px solid rgba(90, 59, 28, 0.6);
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lista-fechas li:hover {
            color: #8b4513;
        }

        /* Panel Central (Contador) */
        .panel-central {
            width: 35%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 1rem;
            transition: all 0.5s ease;
        }

        .contador {
            font-size: 4.5rem;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid #5a3b1c;
            /* Borde irregular tipo boceto */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            padding: 1.5rem 3rem;
            text-align: center;
            transform: rotate(-3deg);
            white-space: nowrap;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
        }

        /* Panel Derecho (Ideas/Notas) */
        .panel-derecho {
            width: 35%;
            font-size: 2rem;
            flex-grow: 1; /* Permite crecer para ocupar el espacio vacío */
        }

        /* Al expandirse, el panel derecho toma el espacio de las fechas */
        .contenedor.expandido .panel-derecho {
            width: 65%;
        }
        .contenedor.expandido .panel-central {
            width: 30%;
        }

        /* --- ADAPTACIÓN PARA PANTALLAS PEQUEÑAS (CELULARES) --- */
        @media (max-width: 900px) {
            body { overflow-y: auto; }
            
            .contenedor {
                flex-direction: column;
                align-items: center;
                height: auto;
                padding-top: 5rem;
                padding-bottom: 2rem;
            }

            .panel-izquierdo {
                width: 95% !important;
                max-width: 100%;
                height: 250px;
            }

            .panel-central {
                width: 100% !important;
            }

            .panel-derecho {
                width: 95% !important;
                height: 600px;
            }

            .contador {
                font-size: 3rem;
                padding: 1rem 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Botón Menú Hamburguesa -->
    <div class="btn-menu" id="btn-menu" title="Ocultar/Mostrar Fechas">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Capa del fondo de letras (Efecto integrado en el CSS) -->
    <div class="fondo-animado-container">
        <div class="fondo-texto" id="fondo-texto"></div>
    </div>

    <div class="contenedor" id="contenedor-principal">
        <!-- Izquierda: Fechas -->
        <div class="panel panel-izquierdo" id="panel-menu">
            <ul class="lista-fechas">
                <li>12, febrero</li>
                <li>13, febrero</li>
                <li>14, febrero</li>
                <!-- Añade más fechas aquí -->
            </ul>
        </div>

        <!-- Centro: Contador de días -->
        <div class="panel-central">
            <div class="contador">
                <span id="dias-transcurridos">0</span> / 365 dias
            </div>
        </div>

        <!-- Derecha: Ideas / Notas -->
        <div class="panel panel-derecho">
            <h2>Mi diario</h2>
            <p>Escribe aquí lo que sientas bro...</p>
        </div>
    </div>

    <script>
        // --- 1. Lógica del Menú Hamburguesa ---
        const btnMenu = document.getElementById('btn-menu');
        const panelMenu = document.getElementById('panel-menu');
        const contenedorPrincipal = document.getElementById('contenedor-principal');

        btnMenu.addEventListener('click', () => {
            panelMenu.classList.toggle('oculto');
            contenedorPrincipal.classList.toggle('expandido');
        });

        // --- 2. Generar el texto de fondo repetido ("fio te amo") ---
        const contenedorFondo = document.getElementById('fondo-texto');
        const frase = "fio te amo. ";
        // Generamos un bloque gigante de texto para la animación
        contenedorFondo.innerText = frase.repeat(2000);

        // --- 3. Calcular los días transcurridos de forma exacta ---
        // Usamos formato ISO (Año-Mes-Día)
        const fechaInicio = new Date("2026-02-12T00:00:00"); 
        const fechaActual = new Date(); // La fecha actual del sistema

        const diferenciaMilisegundos = Math.max(0, fechaActual - fechaInicio);
        const diasTranscurridos = Math.floor(diferenciaMilisegundos / (1000 * 60 * 60 * 24));

        document.getElementById('dias-transcurridos').innerText = diasTranscurridos;
    </script>

</body>
</html>
